name: CI — Node.js + Playwright (Chromium)

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: Build and smoke test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke checks
        run: |
          echo "Checking Playwright and project's parser"
          node -e "require('playwright-chromium'); console.log('playwright-chromium OK')"
          node -e "const p = require('./parsers/baseParser'); console.log(typeof p.parsePrice === 'function' ? 'parsePrice OK' : 'parsePrice MISSING')"

      - name: (Optional) Run tests
        if: false
        run: npm test

      - name: Upload Playwright cache (no-op for runner)
        if: always()
        run: echo "Workflow finished"
